<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mickey Chan's Legacy</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <nav class="bg-black text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-5xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <a href="#" onclick="switchTab('home')" class="text-xl font-bold tracking-wide hover:text-blue-400 transition">MICKEY CHAN'S LEGACY</a>
            <div class="flex gap-1 sm:gap-2">
                <button onclick="switchTab('cv')" id="btn-cv" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium hover:bg-zinc-900 transition">CV</button>
                <button onclick="switchTab('tools')" id="btn-tools" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium hover:bg-zinc-900 transition">Engineering Tools</button>
                <button onclick="switchTab('projects')" id="btn-projects" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium hover:bg-zinc-900 transition">Projects</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-10 flex-grow w-full">

        <section id="page-home" class="tab-content hidden space-y-8 animate-fade-in">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 text-center sm:text-left sm:flex items-center justify-between gap-8">
                <div class="space-y-4">
                    <h1 class="text-4xl font-extrabold text-slate-900">Welcome to Mickey Chan's Legacy</h1>
                    <p class="text-lg text-gray-600 max-w-2xl">
                        I am a professional specializing in engineering solutions, technical data analysis, and project management. Explore my background, technical toolkit, and key project deliveries below.
                    </p>
                    <div class="pt-2 flex flex-wrap justify-center sm:justify-start gap-3">
                        <button onclick="switchTab('cv')" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-medium shadow-sm transition">View CV</button>
                        <button onclick="switchTab('projects')" class="bg-slate-800 hover:bg-slate-900 text-white px-5 py-2.5 rounded-xl font-medium shadow-sm transition">Explore Projects</button>
                    </div>
                </div>
                <div class="hidden md:block text-slate-200 text-9xl">
                    <i class="fa-solid fa-helmet-safety"></i>
                </div>
            </div>
        </section>

        <section id="page-cv" class="tab-content hidden space-y-8">
            <div class="flex justify-between items-center border-b border-gray-200 pb-4">
                <h2 class="text-3xl font-bold text-slate-900"><i class="fa-solid fa-file-invoice mr-3 text-blue-600"></i>Curriculum Vitae</h2>
                <a href="#" class="bg-blue-50 text-blue-600 hover:bg-blue-100 px-4 py-2 rounded-lg text-sm font-semibold transition">
                    <i class="fa-solid fa-download mr-2"></i>Download PDF
                </a>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-6">
                <h3 class="text-xl font-bold text-slate-800 border-l-4 border-blue-600 pl-3">Professional Experience</h3>
                
                <div class="relative border-l border-gray-200 pl-6 ml
